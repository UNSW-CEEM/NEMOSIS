name: Tests

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python-version }}

      # test_performance_stats.py covers `custom_tables` (VWAP, capacity
      # factors, plant stats) and hits AEMO over the network + references
      # local files that aren't in CI. Parked until ported to offline.
      # Everything else runs against the in-process dummy server from
      # tests/conftest.py and is fully offline.
      - name: Run tests
        run: >
          uv run pytest tests/
          --ignore=tests/test_performance_stats.py
          -v
